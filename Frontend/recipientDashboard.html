<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipient Dashboard | Blood Bank</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      font-family: 'Poppins', sans-serif;
    }

    .navbar {
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .navbar h1 {
      font-size: 1.8em;
      color: #ff6b6b;
    }

    .navbar button {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .navbar button:hover {
      background: #ff5252;
      transform: translateY(-2px);
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: 0.3s;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
    }

    .card h2 {
      font-size: 1.4em;
      margin-bottom: 20px;
      color: #ff6b6b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #b0b0b0;
      font-size: 0.95em;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-radius: 8px;
      font-size: 1em;
      transition: 0.3s;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #ff6b6b;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #888;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6b6b 0%, #c0392b 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
    }

    .alert {
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    .alert.success {
      background: rgba(46, 204, 113, 0.2);
      border: 1px solid rgba(46, 204, 113, 0.5);
      color: #2ecc71;
    }

    .alert.error {
      background: rgba(231, 76, 60, 0.2);
      border: 1px solid rgba(231, 76, 60, 0.5);
      color: #e74c3c;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .table-section {
      grid-column: 1 / -1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table th {
      background: rgba(255, 107, 107, 0.15);
      padding: 15px;
      text-align: left;
      font-weight: 700;
      color: #ff6b6b;
      border-bottom: 2px solid rgba(255, 107, 107, 0.3);
    }

    table td {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    table tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .status-badge.pending {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .status-badge.approved {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }

    .status-badge.rejected {
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
    }

    .urgency-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .urgency-badge.high {
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
    }

    .urgency-badge.medium {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .urgency-badge.low {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .navbar {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <h1>🩹 Recipient Dashboard</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- Main Container -->
  <div class="container">
    <div class="grid">
      <!-- Blood Request Form -->
      <div class="card">
        <h2>🩸 Request Blood</h2>
        <div id="requestAlert" class="alert"></div>
        <form id="requestForm">
          <div class="form-group">
            <label>Blood Type</label>
            <select id="bloodType" required>
              <option value="">Select Blood Type</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
            </select>
          </div>

          <div class="form-group">
            <label>City</label>
            <select id="city" required>
              <option value="">Select Your City</option>
              <option value="Mumbai">Mumbai</option>
              <option value="Delhi">Delhi</option>
              <option value="Bangalore">Bangalore</option>
              <option value="Chennai">Chennai</option>
              <option value="Hyderabad">Hyderabad</option>
              <option value="Kolkata">Kolkata</option>
              <option value="Pune">Pune</option>
              <option value="Ahmedabad">Ahmedabad</option>
              <option value="Jaipur">Jaipur</option>
              <option value="Vijayawada">Vijayawada</option>
            </select>
          </div>

          <div class="form-group">
            <label>Hospital/Location</label>
            <input type="text" id="location" placeholder="Hospital name" required />
          </div>

          <div class="form-group">
            <label>Urgency Level</label>
            <select id="urgency" required>
              <option value="">Select Urgency</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High (Emergency)</option>
            </select>
          </div>

          <div class="form-group">
            <label>Units Needed</label>
            <input type="number" id="units" min="1" max="10" placeholder="Number of units" required />
          </div>

          <div class="form-group">
            <label>Medical Notes</label>
            <textarea id="notes" placeholder="Any relevant medical information..." rows="3"></textarea>
          </div>

          <button type="submit" class="btn-primary">Submit Request</button>
        </form>
      </div>

      <!-- Request Statistics -->
      <div class="card">
        <h2>📊 Your Statistics</h2>
        <div style="padding: 20px;">
          <div style="margin-bottom: 20px; padding: 15px; background: rgba(76, 175, 80, 0.15); border-radius: 8px;">
            <div style="font-size: 2em; color: #4caf50; font-weight: 700;" id="approvedCount">0</div>
            <div style="color: #b0b0b0;">Approved Requests</div>
          </div>
          <div style="margin-bottom: 20px; padding: 15px; background: rgba(255, 193, 7, 0.15); border-radius: 8px;">
            <div style="font-size: 2em; color: #ffc107; font-weight: 700;" id="pendingCount">0</div>
            <div style="color: #b0b0b0;">Pending Requests</div>
          </div>
          <div style="padding: 15px; background: rgba(231, 76, 60, 0.15); border-radius: 8px;">
            <div style="font-size: 2em; color: #e74c3c; font-weight: 700;" id="rejectedCount">0</div>
            <div style="color: #b0b0b0;">Rejected Requests</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Request History -->
    <div class="card table-section">
      <h2>📋 Request History</h2>
      <div id="historyAlert" class="alert"></div>
      <div id="historyContainer">
        <p style="color: #b0b0b0; text-align: center; padding: 40px;">Loading request history...</p>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    window.addEventListener('load', () => {
      if (!token) {
        window.location.href = 'login.html';
      } else {
        loadRequestHistory();
      }
    });

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    async function loadRequestHistory() {
      try {
        const res = await fetch('http://localhost:3000/api/recipient/my-requests', {
          headers: { Authorization: `Bearer ${token}` }
        });
        const requests = await res.json();

        // Calculate statistics
        let approved = 0, pending = 0, rejected = 0;

        if (!Array.isArray(requests) || requests.length === 0) {
          document.getElementById('historyContainer').innerHTML = '<p style="color: #b0b0b0; text-align: center; padding: 40px;">No requests yet.</p>';
          document.getElementById('approvedCount').textContent = '0';
          document.getElementById('pendingCount').textContent = '0';
          document.getElementById('rejectedCount').textContent = '0';
          return;
        }

        let html = '<table><thead><tr><th>Blood Type</th><th>Units</th><th>City</th><th>Urgency</th><th>Status</th><th>Date</th></tr></thead><tbody>';
        requests.forEach(r => {
          if (r.status === 'approved') approved++;
          else if (r.status === 'pending') pending++;
          else if (r.status === 'rejected') rejected++;

          const date = new Date(r.date).toLocaleDateString();
          const urgencyClass = r.urgency || 'medium';
          const urgencyText = (r.urgency || 'medium').charAt(0).toUpperCase() + (r.urgency || 'medium').slice(1);
          const statusText = (r.status || 'pending').charAt(0).toUpperCase() + (r.status || 'pending').slice(1);
          const statusClass = r.status || 'pending';

          html += `<tr>
            <td><strong>${r.bloodType}</strong></td>
            <td>${r.units || 1}</td>
            <td>${r.city}</td>
            <td><span class="urgency-badge ${urgencyClass}">${urgencyText}</span></td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            <td>${date}</td>
          </tr>`;
        });
        html += '</tbody></table>';

        document.getElementById('historyContainer').innerHTML = html;
        document.getElementById('approvedCount').textContent = approved;
        document.getElementById('pendingCount').textContent = pending;
        document.getElementById('rejectedCount').textContent = rejected;
      } catch (err) {
        console.error(err);
        document.getElementById('historyAlert').textContent = 'Failed to load history';
        document.getElementById('historyAlert').className = 'alert error';
        document.getElementById('historyAlert').style.display = 'block';
      }
    }

    // Handle form submission
    document.getElementById('requestForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const bloodType = document.getElementById('bloodType').value;
      const city = document.getElementById('city').value;
      const location = document.getElementById('location').value;
      const urgency = document.getElementById('urgency').value;
      const units = document.getElementById('units').value;
      const notes = document.getElementById('notes').value;

      if (!bloodType || !city || !location || !urgency || !units) {
        showAlert('Please fill in all required fields', 'error');
        return;
      }

      try {
        const res = await fetch('http://localhost:3000/api/recipient/request', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ bloodType, city, location, urgency, units, notes })
        });

        const data = await res.json();
        if (res.ok) {
          showAlert('✓ Blood request submitted successfully!', 'success');
          document.getElementById('requestForm').reset();
          loadRequestHistory();
        } else {
          showAlert(data.message || 'Failed to submit request', 'error');
        }
      } catch (err) {
        console.error(err);
        showAlert('Server error. Please try again.', 'error');
      }
    });

    function showAlert(message, type = 'success') {
      const alert = document.getElementById('requestAlert');
      alert.textContent = message;
      alert.className = `alert ${type}`;
      alert.style.display = 'block';
      setTimeout(() => {
        alert.style.display = 'none';
        alert.className = 'alert';
      }, 4000);
    }
  </script>
</body>
</html>
